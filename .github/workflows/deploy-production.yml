name: Deploy — Production

on:
  push:
    branches: [main]

# ================================================================
# DUNAZOE LEVEL 4 AI DEVOPS PIPELINE
# Flow: GitHub push → Deployment AI Audit → Approval → Deploy
# Live Dashboard: https://9e5b4e75-943a-4219-8c78-a1cf48cb7753-00-1sfx72v0oq3y9.kirk.replit.dev
# Audit API: deployment-ai-service (port 4027) must be running
# ================================================================

env:
  DEPLOYMENT_AI_URL: ${{ vars.DEPLOYMENT_AI_URL || 'https://9e5b4e75-943a-4219-8c78-a1cf48cb7753-00-1sfx72v0oq3y9.kirk.replit.dev' }}

jobs:
  # ──────────────────────────────────────────────────────────────
  # GATE 1 — Notify Deployment AI Dashboard (always runs first)
  # ──────────────────────────────────────────────────────────────
  notify-pipeline-start:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Deployment AI — pipeline started
        run: |
          echo "🚀 Notifying DUNAZOE Deployment AI Dashboard..."
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-GitHub-Delivery: ${{ github.run_id }}" \
            -d '{
              "event":       "pipeline_started",
              "repo":        "${{ github.repository }}",
              "branch":      "${{ github.ref_name }}",
              "commit":      "${{ github.sha }}",
              "actor":       "${{ github.actor }}",
              "run_id":      "${{ github.run_id }}",
              "timestamp":   "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
            }' \
            "${{ env.DEPLOYMENT_AI_URL }}/api/pipeline/notify" \
            -o /tmp/notify_response.json 2>&1 || true

          echo "Dashboard notification sent (non-blocking)"
          cat /tmp/notify_response.json 2>/dev/null || echo "(no response body — dashboard backend not yet active)"

  # ──────────────────────────────────────────────────────────────
  # GATE 2 — Inline Security Audit (runs without external service)
  # ──────────────────────────────────────────────────────────────
  security-audit:
    runs-on: ubuntu-latest
    needs: notify-pipeline-start
    outputs:
      security_passed: ${{ steps.audit.outputs.security_passed }}
      audit_score:     ${{ steps.audit.outputs.audit_score }}

    steps:
      - uses: actions/checkout@v4

      - name: Run inline security audit
        id: audit
        env:
          NODE_ENV: ci
        run: |
          echo "🔍 DUNAZOE Deployment AI — Inline Security Audit"
          SCORE=100
          ISSUES=""

          # Check JWT secret won't use a fallback
          if grep -r '"dunazoe_secret_change_in_prod"' apps/core/ --include="*.js" 2>/dev/null | grep -v "\.md"; then
            echo "❌ JWT secret fallback found"
            SCORE=$((SCORE - 25))
            ISSUES="$ISSUES|JWT_FALLBACK"
          else
            echo "✅ JWT_SECRET: no hardcoded fallback"
          fi

          # Check RBAC module exists
          if [ -f "apps/core/shared/rbac.js" ]; then
            echo "✅ RBAC module present"
          else
            echo "❌ RBAC module missing"
            SCORE=$((SCORE - 15))
            ISSUES="$ISSUES|MISSING_RBAC"
          fi

          # Check ledger engine exists
          if [ -f "apps/core/shared/ledger/ledgerEngine.js" ]; then
            echo "✅ Ledger engine present"
          else
            echo "❌ Ledger engine missing"
            SCORE=$((SCORE - 20))
            ISSUES="$ISSUES|MISSING_LEDGER"
          fi

          # Check internal auth exists
          if [ -f "apps/core/shared/internalAuth.js" ]; then
            echo "✅ Internal auth (HMAC) present"
          else
            echo "❌ Internal auth missing"
            SCORE=$((SCORE - 10))
            ISSUES="$ISSUES|MISSING_INTERNAL_AUTH"
          fi

          # Check no hardcoded secrets
          if grep -rE "(sk_live|pk_live|sk_test|whsec_)" apps/core/ --include="*.js" 2>/dev/null | grep -v ".env"; then
            echo "❌ Hardcoded payment keys detected"
            SCORE=$((SCORE - 30))
            ISSUES="$ISSUES|HARDCODED_PAYMENT_KEYS"
          else
            echo "✅ No hardcoded payment keys"
          fi

          # Check dunazoe-express has package.json
          if [ -f "apps/core/services/dunazoe-express/package.json" ]; then
            echo "✅ dunazoe-express package.json present"
          else
            echo "⚠️  dunazoe-express missing package.json"
            SCORE=$((SCORE - 5))
            ISSUES="$ISSUES|MISSING_DUNAZOE_EXPRESS_PKG"
          fi

          echo ""
          echo "════════════════════════════════════"
          echo "  SECURITY AUDIT SCORE: $SCORE/100  "
          echo "════════════════════════════════════"

          PASSED="false"
          if [ "$SCORE" -ge 90 ]; then
            echo "  STATUS: ✅ PASSED (≥90)"
            PASSED="true"
          else
            echo "  STATUS: ❌ FAILED (<90)"
            echo "  ISSUES: $ISSUES"
          fi

          echo "security_passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "audit_score=$SCORE"      >> "$GITHUB_OUTPUT"

          if [ "$PASSED" != "true" ]; then
            echo "::error::🔴 Security audit failed (score: $SCORE/100). Fix issues: $ISSUES"
            exit 1
          fi

  # ──────────────────────────────────────────────────────────────
  # GATE 3 — Deployment AI External Audit (calls live service)
  # Soft-fail until deployment-ai-service backend is activated
  # ──────────────────────────────────────────────────────────────
  deployment-ai-audit:
    runs-on: ubuntu-latest
    needs: security-audit
    if: needs.security-audit.outputs.security_passed == 'true'
    outputs:
      approved: ${{ steps.audit.outputs.approved }}

    steps:
      - uses: actions/checkout@v4

      - name: Call Deployment AI Master Audit
        id: audit
        run: |
          echo "🤖 Calling DUNAZOE Deployment AI audit service..."
          RESPONSE=$(curl -sf \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOYMENT_AI_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "version": "${{ github.sha }}",
              "environment": "production",
              "hosting_provider": "replit",
              "repo": "${{ github.repository }}",
              "actor": "${{ github.actor }}"
            }' \
            "${{ env.DEPLOYMENT_AI_URL }}/deployment/audit" \
            --max-time 30 \
            2>/dev/null \
          || echo '{"approved":null,"ceo_summary":{"headline":"AUDIT_SERVICE_OFFLINE","color_code":"YELLOW"},"_offline":true}')

          echo "Audit response:"
          echo "$RESPONSE" | python3 -m json.tool 2>/dev/null || echo "$RESPONSE"

          # Check if service is offline
          IS_OFFLINE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('_offline') else 'false')" 2>/dev/null || echo "true")

          if [ "$IS_OFFLINE" = "true" ]; then
            echo "::warning::⚠️  Deployment AI backend not yet active. Running in CI-only mode."
            echo "::warning::   Add backend API to Account 2 Replit project — see docs/audit/DEPLOYMENT_AI_INTEGRATION.md"
            echo "approved=ci_only" >> "$GITHUB_OUTPUT"
          else
            APPROVED=$(echo "$RESPONSE" | python3 -c "import sys,json; print(str(json.load(sys.stdin).get('approved', False)).lower())" 2>/dev/null || echo "false")
            echo "approved=$APPROVED" >> "$GITHUB_OUTPUT"

            if [ "$APPROVED" != "true" ]; then
              echo "::error::🔴 Deployment AI BLOCKED deployment. Review scores above."
              exit 1
            fi
            echo "✅ Deployment AI approved — GREEN light for production."
          fi

  # ──────────────────────────────────────────────────────────────
  # GATE 4 — Production Deploy (only runs if all gates passed)
  # ──────────────────────────────────────────────────────────────
  deploy-production:
    runs-on: ubuntu-latest
    needs: deployment-ai-audit
    if: needs.deployment-ai-audit.outputs.approved == 'true' || needs.deployment-ai-audit.outputs.approved == 'ci_only'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Create pre-deploy backup signal
        run: |
          echo "📦 Pre-deployment backup triggered"
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOYMENT_AI_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"event":"pre_deploy","version":"${{ github.sha }}","environment":"production"}' \
            "${{ env.DEPLOYMENT_AI_URL }}/api/pipeline/notify" || true

      # ── ADAPT THIS TO YOUR HOSTING PROVIDER ───────────────────
      # Replit (current):
      #   - name: Trigger Replit deploy
      #     run: curl -X POST "${{ secrets.REPLIT_DEPLOY_HOOK }}"
      #
      # VPS/Contabo:
      #   - uses: appleboy/ssh-action@v1
      #     with:
      #       host: ${{ secrets.CONTABO_HOST }}
      #       username: ${{ secrets.CONTABO_USER }}
      #       key: ${{ secrets.CONTABO_SSH_KEY }}
      #       script: |
      #         cd /opt/dunazoe-supermaster/apps/core
      #         git pull origin main
      #         docker-compose up --build -d
      - name: Deploy — configure target
        run: |
          echo "⚠️  Production deploy target not yet configured."
          echo "Uncomment the appropriate deploy step above (Replit/VPS/AWS)."
          echo "See: docs/audit/DEPLOYMENT_AI_INTEGRATION.md"

      - name: Smoke test production
        run: |
          sleep 10
          curl -sf "${{ vars.PRODUCTION_URL || 'https://dunazoe.com' }}/health" \
            && echo "✅ Production healthy" \
            || echo "⚠️  Production health check — configure PRODUCTION_URL in GitHub vars"

      - name: Notify Deployment AI — deploy complete
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "event":       "deploy_complete",
              "version":     "${{ github.sha }}",
              "environment": "production",
              "status":      "success",
              "actor":       "${{ github.actor }}",
              "run_id":      "${{ github.run_id }}"
            }' \
            "${{ env.DEPLOYMENT_AI_URL }}/api/pipeline/notify" || true
          echo "👀 72-hour post-deployment monitoring active."

  # ──────────────────────────────────────────────────────────────
  # ROLLBACK — fires on any job failure
  # ──────────────────────────────────────────────────────────────
  rollback:
    runs-on: ubuntu-latest
    if: failure()
    needs: [security-audit, deployment-ai-audit, deploy-production]
    environment: production

    steps:
      - name: Alert Deployment AI — rollback needed
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "event":   "rollback_needed",
              "run_id":  "${{ github.run_id }}",
              "version": "${{ github.sha }}",
              "reason":  "Pipeline failure"
            }' \
            "${{ env.DEPLOYMENT_AI_URL }}/api/pipeline/notify" || true
          echo "::error::🔄 Deployment failed. Manual rollback may be required."
          echo "Rollback endpoint: POST ${{ env.DEPLOYMENT_AI_URL }}/deployment/rollback"
