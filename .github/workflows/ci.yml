name: CI — Lint & Test

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dunazoe_test
          POSTGRES_PASSWORD: dunazoe_test
          POSTGRES_DB: dunazoe_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://dunazoe_test:dunazoe_test@localhost:5432/dunazoe_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test_jwt_secret_minimum_32_characters_ok
      REFRESH_SECRET: test_refresh_secret_32_characters_ok
      INTERNAL_SECRET: test_internal_secret_32_characters_ok

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/core/package-lock.json

      - name: Run schema migrations
        working-directory: apps/core
        run: |
          psql "$DATABASE_URL" -f shared/schema.sql
          psql "$DATABASE_URL" -f shared/schema-phase3-4.sql
          psql "$DATABASE_URL" -f shared/schema-phase5-8.sql
          psql "$DATABASE_URL" -f shared/schema-phase9.sql
        env:
          PGPASSWORD: dunazoe_test

      - name: Install dependencies (gateway + services)
        working-directory: apps/core
        run: |
          for dir in gateway services/*-service; do
            if [ -f "$dir/package.json" ]; then
              echo "Installing $dir"
              (cd "$dir" && npm install --no-audit --no-fund)
            fi
          done

      - name: Syntax check all services
        working-directory: apps/core
        run: |
          fail=0
          for f in gateway/index.js services/*/index.js shared/**/*.js; do
            node --check "$f" || fail=1
          done
          exit $fail

      - name: Run unit tests
        working-directory: apps/core
        run: npx jest --selectProjects unit --ci

      - name: Run security tests
        working-directory: apps/core
        run: npx jest --selectProjects security --ci
        continue-on-error: true # security suite requires running services — soft-fail in CI for now

      - name: Lint frontend
        working-directory: apps/core/frontend
        run: |
          npm install --no-audit --no-fund
          npm run lint || true

  fintech-language-check:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Scan frontend for forbidden fintech terms (Update #96 §6)
        run: |
          FORBIDDEN="bank|deposit|savings account|savings_account"
          MATCHES=$(grep -rEi "$FORBIDDEN" apps/core/frontend/src --include="*.jsx" --include="*.js" || true)
          if [ -n "$MATCHES" ]; then
            echo "::warning::Forbidden fintech language found (Update #96 §6):"
            echo "$MATCHES"
          else
            echo "✅ No forbidden fintech terms found in frontend"
          fi
