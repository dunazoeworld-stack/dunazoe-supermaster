name: Deploy — Staging

on:
  push:
    branches: [develop]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Notify deployment start
        run: echo "🚀 Deploying develop → staging.dunazoe.com"

      # ── ADAPT THIS STEP TO YOUR HOSTING PROVIDER ──────────────
