      - name: Placeholder — configure deployment target
        run: |
          echo "⚠️  No deployment target configured yet."
          echo "Edit .github/workflows/deploy-staging.yml and uncomment the"
          echo "appropriate deployment step for your hosting provider."

      - name: Smoke test staging health endpoint
        run: |
          sleep 15
          curl -sf "${{ vars.STAGING_URL || 'https://staging.dunazoe.com' }}/health" \
            && echo "✅ Staging healthy" \
            || echo "⚠️ Staging health check failed (expected until target configured)"
