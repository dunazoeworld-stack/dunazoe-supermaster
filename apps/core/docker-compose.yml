version: '3.8'

# =====================================================================
# DUNAZOE SUPERMASTER — docker-compose.yml
# Version: v1.0.0-rc1   Rebuilt: 2026-06-16
# 33 microservices + gateway + frontend + infra
# network_mode: host — required (gateway SVC map uses localhost URLs)
# =====================================================================

services:

  # ── INFRASTRUCTURE ─────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: dunazoe-postgres
    restart: unless-stopped
    env_file: .env.docker
    environment:
      POSTGRES_DB:       dunazoe_db
      POSTGRES_USER:     dunazoe_user
      POSTGRES_PASSWORD: dunazoe_pass_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dunazoe_user -d dunazoe_db"]
      interval: 10s
      timeout:  5s
      retries:  10

  redis:
    image: redis:7.2-alpine
    container_name: dunazoe-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: dunazoe-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout:  5s
      retries:  5

  pgbouncer:
    image: bitnami/pgbouncer:1.22.1
    container_name: dunazoe-pgbouncer
    restart: unless-stopped
    environment:
      POSTGRESQL_HOST:              postgres
      POSTGRESQL_PORT:              5432
      POSTGRESQL_DATABASE:          dunazoe_db
      POSTGRESQL_USERNAME:          dunazoe_user
      POSTGRESQL_PASSWORD:          dunazoe_pass_dev
      PGBOUNCER_POOL_MODE:          transaction
      PGBOUNCER_MAX_CLIENT_CONN:    2000
      PGBOUNCER_DEFAULT_POOL_SIZE:  50
    ports:
      - "5433:5432"
    depends_on:
      postgres: { condition: service_healthy }

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: dunazoe-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:11.0.0
    container_name: dunazoe-grafana
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD:      dunazoe_grafana_change_in_prod
      GF_USERS_ALLOW_SIGN_UP:          "false"
      GF_ANALYTICS_REPORTING_ENABLED:  "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  nginx:
    image: nginx:1.26-alpine
    container_name: dunazoe-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./monitoring/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/public:/var/www/dunazoe/public:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - gateway

  certbot:
    image: certbot/certbot:latest
    container_name: dunazoe-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do certbot renew; sleep 12h & wait $${!}; done;"

  # ── GATEWAY (Host Network — routes to all services via localhost) ──

  gateway:
    build:
      context:    ./gateway
      dockerfile: Dockerfile
    container_name: dunazoe-gateway
    restart:      unless-stopped
    network_mode: host
    env_file:     .env.docker
    environment:  { PORT: 3000, SERVICE_NAME: gateway, NODE_ENV: production }
    depends_on:
      postgres:  { condition: service_healthy }
      redis:     { condition: service_healthy }

  # ── FRONTEND ───────────────────────────────────────────────────────

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: dunazoe-frontend
    restart:      unless-stopped
    network_mode: host
    env_file:     .env.docker
    environment:  { PORT: 5000, NODE_ENV: production, NEXT_PUBLIC_API_URL: http://localhost:3000 }
    depends_on:
      - gateway

  # ── MICROSERVICES (4001–4033, network_mode: host) ─────────────────

  auth:
    build: { context: ./services/auth-service, dockerfile: Dockerfile }
    container_name: dunazoe-auth
    restart: unless-stopped
    network_mode: host
    env_file: .env.docker
    environment: { PORT: 4001, SERVICE_NAME: auth-service, NODE_ENV: production }
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  user:
