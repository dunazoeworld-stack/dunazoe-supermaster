# ================================================================
# DUNAZOE OS — PGBOUNCER CONNECTION POOLER
# monitoring/pgbouncer/pgbouncer.ini
#
# CTO RATIONALE (Update #93.1):
#   PostgreSQL max_connections = 200 by default.
#   22 services × 5 pool connections = 110 direct connections.
#   Under load (1000 users), services spike to 20+ connections each.
#   Without pooling: connections exhausted → 503 errors → revenue loss.
#
#   PgBouncer sits between services and PostgreSQL, multiplexing
#   thousands of client connections into a small pool of DB connections.
#
#   Mode: transaction (best for web APIs — connection released after query)
# ================================================================

[databases]
dunazoe_db = host=postgres port=5432 dbname=dunazoe_db
             pool_size=50 reserve_pool=10

dunazoe_read = host=postgres-replica port=5432 dbname=dunazoe_db
               pool_size=30 reserve_pool=5

[pgbouncer]
# ── LISTEN ───────────────────────────────────────────────────
listen_addr   = 0.0.0.0
listen_port   = 5433
unix_socket_dir = /var/run/postgresql

# ── AUTH ─────────────────────────────────────────────────────
auth_type     = scram-sha-256
auth_file     = /etc/pgbouncer/userlist.txt

# ── POOL SETTINGS ────────────────────────────────────────────
# transaction = connection released after each transaction (best for APIs)
pool_mode     = transaction

# Max connections PgBouncer accepts from clients (our 22 services)
max_client_conn = 2000

# Default pool size per database/user pair
default_pool_size = 50

# Reserve pool activated when pool is full
reserve_pool_size = 10

# Seconds to wait in reserve pool before giving up
reserve_pool_timeout = 3

# ── TIMEOUTS ─────────────────────────────────────────────────
# Nigerian reality: connections may hang due to network issues
# Kill idle connections faster to reclaim resources

# Close idle server connections after N seconds
server_idle_timeout  = 300    # 5 minutes

# Max time to wait for connection from pool (client side)
query_timeout        = 30     # 30 seconds — never block indefinitely

# Cancel queries taking longer than N seconds
query_wait_timeout   = 10     # 10 seconds queue wait

# Close idle client connections after N seconds
client_idle_timeout  = 60     # 1 minute

# ── LOGGING (for observability) ───────────────────────────────
log_connections      = 0      # reduce noise in production
log_disconnections   = 0
log_pooler_errors    = 1      # always log pool errors
stats_period         = 60     # emit stats every 60s

# ── ADMIN ─────────────────────────────────────────────────────
# pgbouncer admin interface
admin_users          = dunazoe_admin
stats_users          = dunazoe_readonly

# ── TLS (93.13 — all connections use TLS) ─────────────────────
# server_tls_sslmode   = require
# server_tls_ca_file   = /etc/ssl/certs/postgres-ca.crt

# ── IGNORES ───────────────────────────────────────────────────
# Allow clients to use SET without error (Next.js / Prisma compat)
ignore_startup_parameters = extra_float_digits,search_path,application_name
