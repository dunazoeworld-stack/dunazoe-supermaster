# ================================================================
# DUNAZOE OS — NGINX PRODUCTION CONFIG
# monitoring/nginx/nginx.conf
#
# CTO MANDATE (Update #93):
#   93.1  — CDN for all static assets
#   93.4  — Nigeria-aware: compression + lightweight APIs
#   93.13 — TLS 1.3 + HTTPS everywhere
#   93.11 — Zero trust: security headers on every response
#   93.6  — Graceful degradation: health check upstreams
# ================================================================

user  nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── LOGGING (structured for ELK/Loki) ──────────────────
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":"$status",'
        '"bytes":"$body_bytes_sent",'
        '"referer":"$http_referer",'
        '"ua":"$http_user_agent",'
        '"request_time":"$request_time",'
        '"upstream_time":"$upstream_response_time",'
        '"trace_id":"$http_x_trace_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── PERFORMANCE ─────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens      off;   # hide nginx version (93.11)

    # ── COMPRESSION (Nigeria 93.4 — save mobile data) ──────
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_min_length    1000;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml application/xhtml+xml
        image/svg+xml font/woff2 font/woff;

    # ── RATE LIMITING (DDoS protection 93.6) ───────────────
    limit_req_zone  $binary_remote_addr zone=api_limit:10m   rate=100r/m;
    limit_req_zone  $binary_remote_addr zone=auth_limit:10m  rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=webhook_limit:10m rate=30r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── UPSTREAM: API GATEWAY ───────────────────────────────
    upstream dunazoe_gateway {
        least_conn;
        server gateway:3000;
        # Add more gateway instances for multi-AZ (93.1):
        # server gateway-2:3000 backup;
        # server gateway-3:3000 backup;
        keepalive 32;
    }

    # ── UPSTREAM: FRONTEND ──────────────────────────────────
    upstream dunazoe_frontend {
        server frontend:3001;
        keepalive 16;
    }

    # ── UPSTREAM: WEBSOCKET (Socket.IO) ────────────────────
    upstream dunazoe_ws {
        server realtime:4021;
        keepalive 64;
    }

    # ── UPSTREAM: RELIABILITY SERVICE ──────────────────────
    upstream dunazoe_reliability {
        server reliability:4025;
    }

    # ── HTTP → HTTPS REDIRECT ───────────────────────────────
    server {
        listen 80;
        server_name dunazoe.com www.dunazoe.com api.dunazoe.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── MAIN HTTPS SERVER ───────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name dunazoe.com www.dunazoe.com;

        # TLS 1.3 only (93.13)
        ssl_certificate     /etc/letsencrypt/live/dunazoe.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dunazoe.com/privkey.pem;
        ssl_protocols       TLSv1.3 TLSv1.2;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── SECURITY HEADERS (93.11, 93.12) ────────────────
        add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options             "DENY"                                         always;
        add_header X-Content-Type-Options      "nosniff"                                      always;
        add_header X-XSS-Protection            "1; mode=block"                                always;
        add_header Referrer-Policy             "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy          "camera=(),microphone=(),geolocation=(self)"   always;
        add_header Content-Security-Policy     "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.paystack.co; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com; connect-src 'self' https://api.paystack.co wss://dunazoe.com; frame-src 'none';" always;

        # ── STATIC ASSETS (CDN-LIKE, 93.1) ─────────────────
        location /assets/ {
            root /var/www/dunazoe/public;
            expires 30d;
            add_header Cache-Control "public, immutable, max-age=2592000";
            add_header Vary Accept-Encoding;
            access_log off;
            gzip_static on;
        }

        location /_next/static/ {
            proxy_pass http://dunazoe_frontend;
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000";
            access_log off;
        }

        # ── WEBSOCKET (Socket.IO) ───────────────────────────
        location /socket.io/ {
            proxy_pass         http://dunazoe_ws;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── FRONTEND ────────────────────────────────────────
        location / {
            proxy_pass         http://dunazoe_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }
    }

    # ── API SERVER ──────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.dunazoe.com;

        ssl_certificate     /etc/letsencrypt/live/dunazoe.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dunazoe.com/privkey.pem;
        ssl_protocols       TLSv1.3 TLSv1.2;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header X-Frame-Options           "DENY"                                always;

        # ── AUTH ENDPOINTS (strict rate limit) ─────────────
        location ~ ^/auth/(login|register|reset|otp) {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass         http://dunazoe_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── PAYSTACK WEBHOOK (trusted IPs only) ────────────
        location /payments/webhook/paystack {
            # Only allow Paystack IP ranges (93.8)
            allow 52.31.139.75;
            allow 52.49.173.169;
            allow 52.214.14.220;
            # Add all Paystack IPs from: https://paystack.com/docs/payments/webhooks
            deny  all;

            limit_req zone=webhook_limit burst=10 nodelay;
            proxy_pass         http://dunazoe_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host    $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # ── GENERAL API ─────────────────────────────────────
        location / {
            limit_req  zone=api_limit  burst=50 nodelay;
            limit_conn conn_limit 20;

            proxy_pass         http://dunazoe_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;

            # Buffer settings (Nigeria slow connections)
            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      4 32k;
        }

        # ── HEALTH CHECK (no rate limit, no auth) ──────────
        location /health {
            proxy_pass http://dunazoe_gateway/health;
            access_log off;
        }

        # ── PLATFORM STATUS (public) ────────────────────────
        location /status {
            proxy_pass http://dunazoe_reliability/reliability/status-dashboard;
            access_log off;
        }
    }
}
